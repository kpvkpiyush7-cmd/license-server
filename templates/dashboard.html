<!DOCTYPE html>
<html>
<head>
    <title>License Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .btn {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .green { background: #22c55e; }
        .red { background: #ef4444; }
        .blue { background: #3b82f6; }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>

<body>

<h2>🔥 License Control Panel</h2>

<input type="text" id="search" placeholder="Search key..." onkeyup="filterKeys()">

<div id="list"></div>

<script>

async function loadKeys() {
    let res = await fetch('/all_keys');
    let data = await res.json();

    let html = "";

    data.forEach(k => {
        html += `
        <div class="card">
            <b>Key:</b> ${k.key}<br>
            <b>Machine:</b> ${k.machine}<br>
            <b>Expiry:</b> ${k.expiry}<br>
            <b>Status:</b> 
                <span style="color:${k.status=='active'?'lime':'red'}">
                    ${k.status}
                </span><br>

            <button class="btn green" onclick="activate('${k.key}')">Activate</button>
            <button class="btn red" onclick="deactivate('${k.key}')">Deactivate</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

async function deactivate(key) {
    await fetch('/deactivate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
    });
    loadKeys();
}

async function activate(key) {
    await fetch('/activate_key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
    });
    loadKeys();
}

function filterKeys() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(c => {
        if (c.innerText.toLowerCase().includes(input)) {
            c.style.display = "block";
        } else {
            c.style.display = "none";
        }
    });
}

loadKeys();

</script>

</body>
</html>
