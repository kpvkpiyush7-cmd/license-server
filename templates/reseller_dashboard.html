<!DOCTYPE html>
<html>
<head>
    <title>Reseller Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
        }

        .btn {
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .green { background: #22c55e; }
        .blue { background: #3b82f6; }

        .result {
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .balance {
            font-size: 18px;
            color: #22c55e;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h2>🔥 Reseller Panel</h2>

<!-- USER INFO -->
<div class="card">
    <b>Welcome:</b> <span id="name"></span><br>
    💰 Balance: ₹<span id="balance">0</span>
</div>

<!-- GENERATE LICENSE -->
<div class="card">
    <h3>Generate License</h3>

    <input type="text" id="machine" placeholder="Enter Machine ID">

    <select id="months">
        <option value="1">1 Month (₹50)</option>
        <option value="12">1 Year (₹399)</option>
        <option value="999">Lifetime (₹2499)</option>
    </select>

    <button class="btn green" onclick="generate()">Generate Key</button>

    <div class="result" id="result"></div>
</div>

<!-- LICENSE LIST -->
<div class="card">
    <h3>My Licenses</h3>
    <div id="list"></div>
</div>

<script>

//////////////////////////////////////////////////////
// 👤 USER NAME
//////////////////////////////////////////////////////
document.getElementById("name").innerText =
    localStorage.getItem("reseller_name") || "Reseller";

//////////////////////////////////////////////////////
// 💰 LOAD BALANCE
//////////////////////////////////////////////////////
async function loadBalance(){
    let rid = localStorage.getItem("reseller_id")

    let res = await fetch('/reseller/balance/' + rid)
    let data = await res.json()

    document.getElementById("balance").innerText = data.balance
}

//////////////////////////////////////////////////////
// 🔑 GENERATE LICENSE
//////////////////////////////////////////////////////
function generate(){

    let machine = document.getElementById("machine").value

    if(machine.trim() === ""){
        alert("Enter Machine ID ❌")
        return
    }

    fetch("/reseller/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            reseller_id: localStorage.getItem("reseller_id"),
            machine: machine,
            months: document.getElementById("months").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status=="success"){
            document.getElementById("result").innerHTML =
                "<b>KEY:</b> " + data.key + "<br><b>Expiry:</b> " + data.expiry

            load()
            loadBalance()   // 🔥 auto update balance
        }else{
            alert("Low Balance ❌")
        }
    })
}

//////////////////////////////////////////////////////
// 📜 LOAD LICENSE LIST
//////////////////////////////////////////////////////
async function load(){
    let res = await fetch('/all_keys')
    let data = await res.json()

    let html = ""

    data.forEach(k => {
        html += `
        <div class="card">
            ${k.key}<br>
            Expiry: ${k.expiry}
        </div>
        `
    })

    document.getElementById("list").innerHTML = html
}

//////////////////////////////////////////////////////
// 🚀 INIT
//////////////////////////////////////////////////////
load()
loadBalance()

</script>

</body>
</html>
